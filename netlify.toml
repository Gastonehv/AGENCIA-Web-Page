[build]
  command = "npx vite build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NODE_VERSION = "22"
  CI = "false"

[context.production.environment]
  NODE_VERSION = "22"

[context.deploy-preview.environment]
  NODE_VERSION = "22"

[context.branch-deploy.environment]
  NODE_VERSION = "22"
